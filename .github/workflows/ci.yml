name: CI + Docker Push

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Debug secrets
        run: |
          echo "USER: ${{ secrets.DOCKER_USERNAME }}"

      - name: 🔐 Docker Hub login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 🏷️ Set tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: 🐳 Build Image
        run: |
          docker build -t burakcana/devops-app:latest\
                       -t burakcana/devops-app:${{ steps.vars.outputs.TAG }} .

      - name: 📦 Push image
        run: |
          docker push burakcana/devops-app:latest
          docker push burakcana/devops-app:${{ steps.vars.outputs.TAG }}
